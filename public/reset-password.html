<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reset Password - Files on Cloud</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body class="auth-page">

<header class="nav">
  <a href="/" class="brand">
    <img src="backup-file.png" width="32" height="32" alt="">
    <span>Files on Cloud</span>
  </a>

  <div class="nav-cta">
    <button class="btn btn-ghost theme-toggle"></button>
    <a href="/" class="btn btn-outline">Home</a>
  </div>
</header>

<main class="auth-workspace">

  <div class="card auth-card">

    <div style="text-align:center;margin-bottom:24px;">
      <h2>Reset Password</h2>
      <p class="muted">
        Enter your new password.
      </p>
    </div>

    <form id="resetPasswordForm">

      <div
        class="field password-container"
        style="margin-bottom:16px;"
      >

        <span class="field-icon">
          🔒
        </span>

        <input
          type="password"
          id="password"
          placeholder="New Password"
          required
        />

        <button
          type="button"
          id="togglePassword"
          class="toggle-password"
        >
          👁
        </button>

      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block btn-lg"
        id="resetBtn"
      >
        Reset Password
      </button>

    </form>

  </div>

</main>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-section">
      <h3>Files on Cloud</h3>
      <p class="copyright">
        © <span id="year"></span> Files on Cloud
      </p>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>


const API_BASE = 
window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
? `http://localhost:${window.location.port || 10002}`
: "https://files-on-cloud.onrender.com"; //TODO : add correct server side url

const token =
new URLSearchParams(window.location.search)
.get("token");

document.getElementById("togglePassword").addEventListener("click", () => {

    const passwordInput =
        document.getElementById("password");

    passwordInput.type =
        passwordInput.type === "password"
        ? "text"
        : "password";
});

document
.getElementById("resetPasswordForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const password =
        document.getElementById("password")
        .value
        .trim();

    const resetBtn =
        document.getElementById("resetBtn");


    function showToast(message, type="success") {
        const toast =
            document.getElementById("toast");

        toast.textContent = message;

        toast.style.background =
            type === "success"
            ? "#16a34a"
            : "#dc2626";

        toast.hidden = false;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    }

    try {

        resetBtn.disabled = true;
        resetBtn.textContent = "Resetting...";

        const response = await fetch(
        `${API_BASE}/api/auth/reset-password/${token}`,
        {
            method: "POST",
            headers: {
            "Content-Type": "application/json"
            },
            body: JSON.stringify({
            password
            })
        }
        );

        const data = await response.json();

        if (!response.ok) {
        throw new Error(data.message);
        }

        showToast(data.message, data.success == true ? "success" : "error");



    setTimeout(() => {
    window.location.href =
        "/auth.html?mode=login";
    }, 2000);

    } catch (error) {


        showToast(error.message ||
        "Something went wrong", "error");

    } finally {

        resetBtn.disabled = false;
        resetBtn.textContent =
        "Reset Password";
    }

});

document.getElementById("year").textContent =
new Date().getFullYear();

</script>

</body>
</html>
