<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Files on Cloud</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body class="auth-page">

<header class="nav">
  <a href="/" class="brand">
    <img src="backup-file.png" width="32" height="32" alt="">
    <span>Files on Cloud</span>
  </a>

  <div class="nav-cta">
    <button class="btn btn-ghost theme-toggle"></button>
    <a href="/" class="btn btn-outline">Home</a>
  </div>
</header>

<main class="auth-workspace">

  <div class="card auth-card">

    <div style="text-align:center;margin-bottom:24px;">
      <h2>Forgot Password</h2>
      <p class="muted">
        Enter your email and we'll send you a reset link.
      </p>
    </div>

    <form id="forgotPasswordForm">

      <div class="field">
        <span class="field-icon">✉</span>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block btn-lg"
        id="submitBtn"
      >
        Send Reset Link
      </button>

    </form>

  </div>

</main>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-section">
      <h3>Files on Cloud</h3>
      <p class="copyright">
        © <span id="year"></span> Files on Cloud
      </p>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="./js/config.js"></script>
<script>

const config = window.APP_CONFIG;

const form = document.getElementById("forgotPasswordForm");

function showToast(message, type="success") {
    const toast =
        document.getElementById("toast");

    toast.textContent = message;

    toast.style.background =
        type === "success"
        ? "#16a34a"
        : "#dc2626";

    toast.hidden = false;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
if(!config){
  console.error("APP_CONFIG failed to load");
  showToast("Error in loading config", "error");
}

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  const submitBtn = document.getElementById("submitBtn");

  try {

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    const response = await fetch(
      `${config.API_BASE}/api/auth/forgot-password`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      }
    );

    let data;

    try {
        data = await response.json();
    } catch {
        data = {
            success: false,
            message: "Unexpected server response"
        };
    }

    if (!response.ok || !data.success) {
        showToast(data.message, "error");
        return;
    }

    showToast(data.message, "success");

    form.reset();

  } catch (error) {

    showToast(
      error.message ||
      "Something went wrong",
      "error"
    );

  } finally {

    submitBtn.disabled = false;
    submitBtn.textContent =
      "Send Reset Link";
  }

});

document.getElementById("year").textContent =
new Date().getFullYear();

</script>

</body>
</html>
