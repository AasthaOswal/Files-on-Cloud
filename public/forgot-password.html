<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Files on Cloud</title>

  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>

<body class="auth-page">

<header class="nav">
  <a href="/" class="brand">
    <img src="backup-file.png" width="32" height="32" alt="">
    <span>Files on Cloud</span>
  </a>

  <div class="nav-cta">
    <button class="btn btn-ghost theme-toggle"></button>
    <a href="/" class="btn btn-outline">Home</a>
  </div>
</header>

<main class="auth-workspace">

  <div class="card auth-card">

    <div style="text-align:center;margin-bottom:24px;">
      <h2>Forgot Password</h2>
      <p class="muted">
        Enter your email and we'll send you a reset link.
      </p>
    </div>

    <form id="forgotPasswordForm">

      <div class="field">
        <span class="field-icon">✉</span>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block btn-lg"
        id="submitBtn"
      >
        Send Reset Link
      </button>

    </form>

  </div>

</main>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-section">
      <h3>Files on Cloud</h3>
      <p class="copyright">
        © <span id="year"></span> Files on Cloud
      </p>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>

const API_BASE = 
window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
? `http://localhost:${window.location.port || 10002}`
: "https://files-on-cloud.onrender.com"; //TODO : add correct server side url

const form = document.getElementById("forgotPasswordForm");

function showToast(message, type="success") {
    const toast =
        document.getElementById("toast");

    toast.textContent = message;

    toast.style.background =
        type === "success"
        ? "#16a34a"
        : "#dc2626";

    toast.hidden = false;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}


form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  const submitBtn = document.getElementById("submitBtn");

  try {

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    const response = await fetch(
      `${API_BASE}/api/auth/forgot-password`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      }
    );

    const data = await response.json();

    console.log(response)

    if (!response.ok) {
      console.log(response)
      console.log(data)
      showToast(data.message, "error");
    }

    console.log(data)


    showToast(data.message, data.success == true ? "success" : "error");

    form.reset();

  } catch (error) {

    showToast(
      error.message ||
      "Something went wrong",
      "error"
    );

  } finally {

    submitBtn.disabled = false;
    submitBtn.textContent =
      "Send Reset Link";
  }

});

document.getElementById("year").textContent =
new Date().getFullYear();

</script>

</body>
</html>
